services:
  cloudpub:
    image: cloudpub/cloudpub:latest
    container_name: cloudpub
    restart: unless-stopped
    environment:
      - TOKEN=${CLOUDPUB_TOKEN}
      - HTTP=frontend:80
    command: run
    depends_on:
      - frontend
    volumes:
      - cloudpub-config:/home/cloudpub
    networks:
      - app_network

  backend:
    build: ./backend
    container_name: sc-backend
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - ./data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - BASE_URL=${BASE_URL:-}
    networks:
      - app_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
    container_name: sc-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build:
      context: ./backend
      dockerfile: bot/Dockerfile
    container_name: sc-bot
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - BASE_URL=${BASE_URL:-}
    depends_on:
      - backend
    networks:
      - app_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app_network:
    driver: bridge

volumes:
  cloudpub-config:
