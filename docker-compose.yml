services:
  cloudpub:
    image: cloudpub/cloudpub:latest
    container_name: cloudpub
    restart: unless-stopped
    environment:
      - TOKEN=${CLOUDPUB_TOKEN}
      - HTTP=frontend:80
    command: run
    depends_on:
      - frontend
    volumes:
      - cloudpub-config:/home/cloudpub
    networks:
      - app_network

  backend:
    build: ./backend
    container_name: sc-backend
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - "app_data:/data"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
    networks:
      - app_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: sc-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app_network:
    driver: bridge

volumes:
  app_data:
  cloudpub-config:
